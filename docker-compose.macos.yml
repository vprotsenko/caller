# Override for local development on macOS (Docker Desktop, no host network):
#   docker compose -f docker-compose.yml -f docker-compose.macos.yml up
# app shares the network namespace with freeswitch, so ESL on 127.0.0.1 works
# like on Linux; only web port 8000 is published externally (via the freeswitch
# service, because shared-netns ports are published by its container). Real
# SIP/RTP calls don't work here (VM with no LAN IP) — only the UI, preview and
# loopback E2E.
services:
  freeswitch:
    network_mode: bridge
    ports:
      - "8000:8000"
  app:
    network_mode: "service:freeswitch"
