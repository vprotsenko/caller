# Production configuration: Linux host with a public IP, host networking for
# both services (SIP/RTP must see the real IP; ESL on 127.0.0.1 is shared).
# Real calls do NOT work on macOS Docker Desktop â€” for local development
# there is docker-compose.macos.yml:
#   docker compose -f docker-compose.yml -f docker-compose.macos.yml up
services:
  freeswitch:
    # Default â€” a prebuilt image (works out of the box). For real AMD, build an
    # image with mod_amd (see Dockerfile.freeswitch) and set in .env:
    #   FREESWITCH_IMAGE=caller-freeswitch:amd
    # Without mod_amd the app degrades gracefully (answer = HUMAN, no hangup).
    image: ${FREESWITCH_IMAGE:-safarov/freeswitch:1.10.12}
    platform: linux/amd64
    network_mode: host
    environment:
      # The ESL password is mandatory: event_socket gives full control over the engine
      - ESL_PASSWORD=${ESL_PASSWORD:?set ESL_PASSWORD in .env}
      # First gateway (FlySIP); empty = placeholders without registration
      - SIP_SERVER=${SIP_SERVER:-}
      - SIP_PORT=${SIP_PORT:-5060}
      - SIP_USER=${SIP_USER:-}
      - SIP_PASSWORD=${SIP_PASSWORD:-}
      # Public IP if the host is behind NAT (empty = auto)
      - EXTERNAL_IP=${EXTERNAL_IP:-}
    volumes:
      # Config â€” static XMLs in the repo; vars.xml injects creds from env
      - ./fs:/etc/freeswitch:ro
      # The app synthesizes the WAVs; FreeSWITCH only reads them at the same path
      - ./audio:/app/audio:ro
    restart: "no"

  app:
    build: .
    network_mode: host
    environment:
      - WEB_USER=${WEB_USER:-admin}
      - WEB_PASSWORD=${WEB_PASSWORD:-}
      - ESL_HOST=127.0.0.1
      - ESL_PORT=8021
      - ESL_PASSWORD=${ESL_PASSWORD:?set ESL_PASSWORD in .env}
      # {gw} = gateway generated from the selected SIP profile (app/gateways.py).
      - DIAL_STRING_TEMPLATE=${DIAL_STRING_TEMPLATE:-sofia/gateway/{gw}/{number}}
      # Trunk caller ID (DID): without it the provider often rejects with CALL_REJECTED.
      - CALLER_ID_NUMBER=${CALLER_ID_NUMBER:-}
      - CALLER_ID_NAME=${CALLER_ID_NAME:-}
      - ORIGINATE_EXTRA_VARS=${ORIGINATE_EXTRA_VARS:-}
      - BRIDGE_EXTRA_VARS=${BRIDGE_EXTRA_VARS:-}
      - AMD_ENABLED=${AMD_ENABLED:-1}
      - LANG_CODE=${LANG_CODE:-uk}
      - FS_CONF_DIR=/app/fs
    volumes:
      # Durable state: SQLite + audio cache.
      # data/ holds SIP passwords in plaintext â€” protect it like .env.
      - ./data:/app/data
      - ./audio:/app/audio
      # The controller generates operator extensions (directory/default/*.xml)
      # and, at stage 5, gateways; FreeSWITCH sees the same directory as ro.
      - ./fs:/app/fs
    depends_on:
      - freeswitch
    restart: "no"
