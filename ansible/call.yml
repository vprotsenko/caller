---
# Start a test campaign through the deployed app (the request runs on the
# server). Web Basic Auth is taken from {{ app_dir }}/.env. The SIP profile is
# the default one in the DB (seeded from SIP_* on first start), or pass -e profile_id.
#
#   ansible-playbook call.yml \
#     -e 'message=Добрий день! Це тест.' -e 'numbers=+380671234567' \
#     [-e voice=F3] [-e campaign_type=operator] [-e 'name=Акція'] \
#     [-e profile_id=1] [-e max_concurrent=1] \
#     [-e ivr_operator=true] [-e ivr_repeat=true] [-e ivr_optout=true]
#
# Multiple numbers — comma-separated in numbers. Then watch:  ansible-playbook status.yml
- name: Start a test campaign
  hosts: caller
  gather_facts: false
  vars:
    app_dir: /opt/caller
    name: "Тестова кампанія"
    voice: F3
    campaign_type: info
    max_concurrent: 1
    ivr_operator: false
    ivr_repeat: false
    ivr_optout: false
    timeout_sec: 5
  tasks:
    - name: Read web credentials from the deployed .env
      ansible.builtin.slurp:
        src: "{{ app_dir }}/.env"
      register: env_file
      no_log: true

    - name: Parse web credentials
      ansible.builtin.set_fact:
        web_user: "{{ (env_file.content | b64decode) | regex_search('WEB_USER=(.*)', '\\1') | first }}"
        web_password: "{{ (env_file.content | b64decode) | regex_search('WEB_PASSWORD=(.*)', '\\1') | first }}"
      no_log: true

    - name: POST /start (JSON contract)
      ansible.builtin.uri:
        url: http://localhost:8000/start
        method: POST
        url_username: "{{ web_user }}"
        url_password: "{{ web_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "{{ name }}"
          message: "{{ message }}"
          voice: "{{ voice }}"
          campaign_type: "{{ campaign_type }}"
          max_concurrent: "{{ max_concurrent | int }}"
          profile_id: "{{ profile_id | default(omit) }}"
          numbers: "{{ numbers.split(',') | map('trim') | list }}"
          ivr:
            operator: { enabled: "{{ ivr_operator | bool }}" }
            repeat: { enabled: "{{ ivr_repeat | bool }}", max: 2 }
            optout: { enabled: "{{ ivr_optout | bool }}" }
            timeout_sec: "{{ timeout_sec | int }}"
            on_timeout: hangup
        status_code: [200, 400, 409]
      register: start

    - name: Result
      ansible.builtin.debug:
        msg: "POST /start -> HTTP {{ start.status }} | {{ start.json }}"
