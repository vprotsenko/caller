[defaults]
inventory = inventory.ini
host_key_checking = False
retry_files_enabled = False
# Не збирати факти автоматично — швидкі плейбуки їх не потребують
# (gather_facts: true лишається явно в deploy.yml).
gathering = explicit

[ssh_connection]
# Один SSH-конект на весь плейбук замість нового на кожен таск (-40% оверхеду),
# + pipelining (менше round-trip'ів на модуль). root-юзер, sudo нема — безпечно.
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=15
