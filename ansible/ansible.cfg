[defaults]
inventory = inventory.ini
host_key_checking = False
retry_files_enabled = False
# Do not gather facts automatically — the fast playbooks don't need them
# (gather_facts: true stays explicit in deploy.yml).
gathering = explicit

[ssh_connection]
# One SSH connection for the whole playbook instead of a new one per task (-40% overhead),
# + pipelining (fewer round-trips per module). root user, no sudo — safe.
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=15
