---
# Deploy Dialer 2.0 (FreeSWITCH + controller) to an Ubuntu host in Docker.
# Built-in modules only (no docker SDK / external collections).
#
#   cd caller/ansible && ansible-playbook deploy.yml
#   ansible-playbook deploy.yml -e web_password='choose-your-own'
#
# The host is Linux with a PUBLIC IP: both containers run in network_mode: host,
# so SIP/RTP work directly. .env is updated line-by-line
# (lineinfile), so SIP_*/ESL_PASSWORD values added by hand on the server survive
# a redeploy. The web login/password are printed at the end.
- name: Deploy caller v2 (FreeSWITCH + app)
  hosts: caller
  gather_facts: true
  vars:
    app_dir: /opt/caller
    web_user: admin
    # FreeSWITCH image: the base one (without mod_amd) by default. For real
    # AMD, build caller-freeswitch:amd and pass -e freeswitch_image=...
    freeswitch_image: "safarov/freeswitch:1.10.12"
    project_files:
      - requirements.txt
      - Dockerfile
      - Dockerfile.freeswitch
      - docker-compose.yml
      - pytest.ini
      - conftest.py

  tasks:
    - name: Read existing .env if present
      ansible.builtin.slurp:
        src: "{{ app_dir }}/.env"
      register: existing_env
      ignore_errors: true
      no_log: true

    - name: "Resolve web password (priority: -e web_password, then existing .env, else generate)"
      ansible.builtin.set_fact:
        web_password: >-
          {{ web_password
             if (web_password is defined and web_password)
             else (
               (existing_env.content | b64decode).split('WEB_PASSWORD=')[1].splitlines()[0]
               if (existing_env is defined
                   and not (existing_env.failed | default(false))
                   and existing_env.content is defined
                   and 'WEB_PASSWORD=' in (existing_env.content | b64decode))
               else lookup('password', '/dev/null length=20 chars=ascii_letters,digits')
             ) }}
      no_log: true

    - name: "Resolve ESL password (priority: existing .env, else generate)"
      ansible.builtin.set_fact:
        esl_password: >-
          {{ (existing_env.content | b64decode).split('ESL_PASSWORD=')[1].splitlines()[0]
             if (existing_env is defined
                 and not (existing_env.failed | default(false))
                 and existing_env.content is defined
                 and 'ESL_PASSWORD=' in (existing_env.content | b64decode))
             else lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}
      no_log: true

    - name: Check whether docker is installed
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Install Docker (official convenience script) if missing
      ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
      when: docker_check.rc != 0

    - name: Ensure Docker is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ensure app directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy project files
      ansible.builtin.copy:
        src: "../{{ item }}"
        dest: "{{ app_dir }}/{{ item }}"
        mode: "0644"
      loop: "{{ project_files }}"

    - name: Copy the app package
      ansible.builtin.copy:
        src: "../app/"
        dest: "{{ app_dir }}/app/"
        mode: "0644"
        directory_mode: "0755"
      register: app_copy

    # Copy ONLY the tracked base config (explicit list) — NOT the whole fs/
    # tree: the dev working copy holds gitignored test stubs (test_*.xml) and
    # generated operator extensions (directory/default/<ext>.xml) that must not
    # reach the host. Operator XML is written on the server by the app itself
    # (POST /config/operators). Keep this list in sync with fs/ base files.
    - name: Copy the FreeSWITCH config (fs/) — tracked base files only
      ansible.builtin.copy:
        src: "../fs/{{ item }}"
        dest: "{{ app_dir }}/fs/{{ item }}"
        mode: "0644"
        directory_mode: "0755"
      loop:
        - freeswitch.xml
        - vars.xml
        - autoload_configs/
        - sip_profiles/external.xml
        - sip_profiles/internal.xml
        - sip_profiles/external/flysip.xml
        - dialplan/default.xml
        - directory/default.xml
      register: fs_copy

    - name: Copy tests (so `docker compose run app pytest` works on the host)
      ansible.builtin.copy:
        src: "../tests/"
        dest: "{{ app_dir }}/tests/"
        mode: "0644"
        directory_mode: "0755"

    # .env line-by-line so hand-added values (SIP_*, EXTERNAL_IP) survive redeploys.
    - name: Write required .env values (Basic Auth + ESL + FreeSWITCH image)
      ansible.builtin.lineinfile:
        path: "{{ app_dir }}/.env"
        create: true
        mode: "0600"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: WEB_USER, value: "{{ web_user }}" }
        - { key: WEB_PASSWORD, value: "{{ web_password }}" }
        - { key: ESL_PASSWORD, value: "{{ esl_password }}" }
        - { key: FREESWITCH_IMAGE, value: "{{ freeswitch_image }}" }
      no_log: true

    - name: Optionally write default SIP trunk creds (passed via -e sip_*)
      ansible.builtin.lineinfile:
        path: "{{ app_dir }}/.env"
        create: true
        mode: "0600"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      when: item.value | length > 0
      loop:
        - { key: SIP_SERVER, value: "{{ sip_server | default('') }}" }
        - { key: SIP_PORT, value: "{{ sip_port | default('') }}" }
        - { key: SIP_USER, value: "{{ sip_user | default('') }}" }
        - { key: SIP_PASSWORD, value: "{{ sip_password | default('') }}" }
        - { key: EXTERNAL_IP, value: "{{ external_ip | default('') }}" }
        - { key: CALLER_ID_NUMBER, value: "{{ caller_id_number | default('') }}" }
        - { key: ORIGINATE_EXTRA_VARS, value: "{{ originate_extra_vars | default('') }}" }
      no_log: true

    # Recreate only what changed (fast redeploy). `up -d --build`
    # rebuilds app and recreates its container only if the code/image changed;
    # compose itself does NOT touch FreeSWITCH (pinned tag + bind-mounted config).
    - name: Build and (re)start the stack
      ansible.builtin.command: docker compose up -d --build
      args:
        chdir: "{{ app_dir }}"
      changed_when: true

    # fs/ is a bind-mount, so compose does not notice changes; when the config
    # has been updated, we recreate ONLY FreeSWITCH (modules load only on restart).
    - name: Recreate FreeSWITCH only if its config changed
      ansible.builtin.command: docker compose up -d --force-recreate --no-deps freeswitch
      args:
        chdir: "{{ app_dir }}"
      changed_when: true
      when: fs_copy.changed

    - name: Wait until the site answers on :8000 (authenticated)
      ansible.builtin.uri:
        url: http://localhost:8000/status
        url_username: "{{ web_user }}"
        url_password: "{{ web_password }}"
        force_basic_auth: true
        status_code: 200
      register: health
      retries: 40
      delay: 3
      until: health.status is defined and health.status == 200
      no_log: true

    - name: Done — credentials
      ansible.builtin.debug:
        msg:
          - "Site:     http://{{ inventory_hostname }}:8000"
          - "Login:    {{ web_user }}"
          - "Password: {{ web_password }}"
          - "FreeSWITCH ESL connected: {{ health.json.esl_connected | default('?') }}"
